services:
  db:
    image: postgres:trixie
    container_name: commendo-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - commendo:/var/lib/postgresql
    profiles:
      - prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - ./api/.env
    profiles:
      - prod

  api-ci:
    build:
      context: ./api
      dockerfile: Dockerfile.ci
    profiles:
      - ci
    volumes:
      - /var/run/docker.sock:/var/run/docker/sock

volumes:
  commendo: